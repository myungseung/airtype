name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'bin/**'
      - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @superdots/airtype version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "remote=$REMOTE" >> $GITHUB_OUTPUT
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "### npm publish" >> $GITHUB_STEP_SUMMARY
          echo "- **Local**: ${{ steps.version.outputs.local }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Remote**: ${{ steps.version.outputs.remote }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.version.outputs.changed }}" == "true" ]; then
            echo "- **Status**: Published v${{ steps.version.outputs.local }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: Skipped (version unchanged)" >> $GITHUB_STEP_SUMMARY
          fi
